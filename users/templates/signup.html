<!DOCTYPE html>
<html>
<head>
    <title>Sign Up</title>
    <style>
        body {
            background: #0c0004;
            color: white;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .box {
            background: rgba(18, 2, 10, 0.9);
            padding: 40px;
            border-radius: 20px;
            width: 350px;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: #2a0a12;
            border: 1px solid #ff4d6d;
            border-radius: 10px;
            color: white;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #ff4d6d;
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
        }
        .error {
            color: #ff9090;
            background: rgba(255,0,0,0.2);
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
<div class="box">
    <h2>Sign Up</h2>
    
    {% if messages %}
        {% for message in messages %}
            <div class="error">{{ message }}</div>
        {% endfor %}
    {% endif %}
    
    <form method="POST" action="/signup/">
        {% csrf_token %}
        <input type="text" name="username" placeholder="Username" required>
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>
        <input type="password" name="confirm_password" placeholder="Confirm Password" required>
        <button type="submit">Sign Up</button>
    </form>
    
    <p style="text-align:center; margin-top:15px;">
        <a href="/login/" style="color:#ffb7c5;">Already have account? Login</a>
    </p>
</div>
</body>
</html>
