<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Edit Patient</title>
</head>
<body>

<h2>Edit Patient</h2>

<form method="POST" action="/patients/update/{{ patient.id }}/">
    {% csrf_token %}

    <input type="text" name="name" value="{{ patient.name }}" required><br><br>
    <input type="text" name="specialty" value="{{ patient.specialty }}" required><br><br>
    <input type="text" name="phone" value="{{ patient.phone }}" required><br><br>
    <input type="email" name="email" value="{{ patient.email }}" required><br><br>

    <button type="submit">Update</button>
</form>

<a href="/patients/">Back</a>

</body>
</html>
